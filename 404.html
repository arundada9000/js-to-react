<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5856d6">
  <title>404 - Page Not Found | JS \u2192 React Roadmap</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="icon" type="image/png" href="assets/logos/cfc-logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--c-bg, #f5f5f7);
      color: var(--c-text, #1d1d1f);
    }
    .error-container {
      text-align: center;
      max-width: 520px;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 900;
      background: linear-gradient(135deg, #5856d6, #ff6b81);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }
    .error-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      color: var(--c-text, #1d1d1f);
    }
    .error-desc {
      font-size: 1rem;
      color: var(--c-text-secondary, #6e6e73);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #5856d6, #7a78e8);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 1rem;
      font-weight: 700;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 16px rgba(88, 86, 214, 0.25);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88, 86, 214, 0.35);
    }
    .btn-home:active {
      transform: translateY(0) scale(0.97);
    }
    .offline-note {
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--c-text-tertiary, #aeaeb2);
    }
    .offline-note i {
      margin-right: 4px;
    }
    @media (prefers-reduced-motion: reduce) {
      .btn-home { transition: none; }
    }
    @media (max-width: 480px) {
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">
      This page doesn't exist or has been moved.<br>
      Let's get you back on track.
    </p>
    <a href="/" class="btn-home">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      Back to Home
    </a>
    <p class="offline-note">
      <i class="fa-solid fa-wifi-slash" aria-hidden="true"></i>
      If you're offline, some pages may not be available.
    </p>
  </div>
</body>
</html>
